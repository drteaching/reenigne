[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "reenigne"
version = "0.2.0"
description = "Record, narrate, and AI-analyze any product workflow — reverse-engineer with reenigne."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Toby" }]
keywords = ["product-analysis", "screenshots", "ai", "reverse-engineering", "competitive-intel"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]
dependencies = [
  "click>=8.1",
  "httpx>=0.27",
  "Pillow>=10.0",
  "imagehash>=4.3",
  "pytesseract>=0.3.10",
  "rich>=13.0",
  "jinja2>=3.1",
  "python-dotenv>=1.0",
  "markdown>=3.5",
  "bleach>=6.0",
]

[project.optional-dependencies]
dev = ["pytest>=7", "black", "ruff", "mypy", "pyinstaller>=6.0"]

[project.scripts]
reenigne = "reenigne.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
