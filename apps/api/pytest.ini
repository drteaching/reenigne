[pytest]
testpaths = tests
# So `app` resolves under a bare `pytest` invocation, not just `python -m pytest`.
pythonpath = .
markers =
    sqlite_only: exercises the local dev-auth path, which cannot run against
        the Supabase schema because profiles.id references auth.users(id).
        Skipped when DATABASE_URL points at Postgres.
filterwarnings =
    ignore::DeprecationWarning:starlette.*
    ignore:Using `httpx` with `starlette.testclient` is deprecated.*
