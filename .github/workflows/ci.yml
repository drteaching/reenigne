name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  worker:
    name: worker (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: packages/worker
        run: pip install -e ".[dev]"
      - name: Lint
        working-directory: packages/worker
        run: ruff check src tests
      - name: Test
        working-directory: packages/worker
        run: pytest -q

  api:
    name: api (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: apps/api
        run: pip install -r requirements-dev.txt
      - name: Test
        working-directory: apps/api
        run: pytest -q

  web:
    name: web (next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: apps/web
        run: npm ci
      - name: Build
        working-directory: apps/web
        run: npm run build

  desktop:
    name: desktop (electron)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: apps/desktop
        run: npm ci
      - name: Typecheck + build
        working-directory: apps/desktop
        run: npm run build
